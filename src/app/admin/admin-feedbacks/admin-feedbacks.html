<div class="container-fluid">
    <div class="row">
        <div class="col-sm-12 col-md-3 p-0" style="min-height: 100vh;">
           <app-admin-sidebar/>
        </div>
        <div class="col-sm-12 col-md-9">
          <h3 class="display-4 mt-2">Feedbacks</h3>
          @if(feedbackList.length > 0){
              <table class="table table-bordered">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Feedback</th>
                </tr>
            </thead>
            <tbody>
                @for(fd of feedbackList;track $index ){
                   <tr>
                    <td>{{$index+1}}</td>
                     <td>{{fd.name}}</td>
                     <td>{{fd.email}}</td>
                     <td>{{fd.feedback}}</td>
                     <td>
                        <button class="btn" (click)="handleDelete(fd._id)">
                            <i class="fa-solid fa-trash text-danger"></i>
                        </button>
                     </td>
                </tr>
                }
                
            </tbody>
          </table>
          }
          @else{
            <h3 class="text-center text-danger">No feedbacks!</h3>
          }
        
        </div>
    </div>
</div>
