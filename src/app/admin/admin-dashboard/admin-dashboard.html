<div class="container-fluid">
    <div class="row">
        <div class="col-sm-12 col-md-3 p-0" style="min-height: 100vh;">
           <app-admin-sidebar/>
        </div>
        <div class="col-sm-12 col-md-9 p-0">
            <div class="bg-success">
               <h3 class="display-4">Dashboard</h3>
            </div>
            <div class="conatiner-fluid text-center row gap-2 p-3">
              <div class="col bg-info rounded shadow p-3">
                <h4>Users:<span class="text-light"> {{userCount}}</span></h4>
                </div>
                <div class="col bg-danger rounded shadow p-3">
                <h4>Recipes:<span class="text-light"> {{recipeCount}}</span></h4>
                </div>
                <div class="col bg-warning rounded shadow p-3">
                <h4>Feedbacks:<span class="text-light"> {{feedbackCount}}</span></h4>
                </div>
                <div class="conatiner-fluid row mt-4">
                 <div class="col">
                    <highcharts-chart
                    [constructorType]="chartConstructor"
                    [options]="chartOptions"
                    class="chart"
                 />
                 </div>
                  <div class="col">
                    <mat-card class="demo-inline-calendar-card">
                    <mat-calendar [(selected)]="selected"></mat-calendar>
                    </mat-card>
                 </div>
                </div>
            </div>
        </div>

    </div>

</div>
