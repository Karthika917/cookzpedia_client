<div class="container-fluid">
    <div class="row">
        <div class="col-sm-12 col-md-3 p-0" style="min-height: 100vh;">
           <app-admin-sidebar/>
        </div>
        <div class="col-sm-12 col-md-9">
          <h3 class="display-4 mt-2">Users</h3>
          @if(userList.length > 0){
              <table class="table table-bordered">
            <thead>
                <tr>
                    <th>#</th>
                     <th>Username</th>
                      <th>Email</th>
                </tr>
            </thead>
            <tbody>
                  @for(user of userList;track $index){
                    <tr>
                    <td>{{$index+1}}</td>
                     <td>{{user.username}}</td>
                     <td>{{user.email}}</td>
                </tr>
                  }
               
            </tbody>
          </table>
          }
          @else{
            <h3 class="text-center text-danger">No Users!</h3>
          }
         
        </div>
    </div>
</div>
